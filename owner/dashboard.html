<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>Dashboard — RentManager</title>
  <script src="../js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, formatCurrency = RM.formatCurrency, getLang = RM.getLang

      var user = await RM.setupOwnerPage('dashboard')
      if (!user) return

      async function load() {
        var housesRes = await RM.db.from('houses').select('id,name,address,city').eq('owner_id', user.id)
        var roomsRes  = await RM.db.from('rooms').select('id,house_id,monthly_rent')

        var houses  = housesRes.data ?? []
        var rooms   = roomsRes.data  ?? []
        var roomIds = rooms.map(function(r) { return r.id })

        var leases = []
        if (roomIds.length) {
          var lRes = await RM.db.from('leases').select('id,room_id,monthly_rent,tenant_id').eq('status','active').in('room_id', roomIds)
          leases = lRes.data ?? []
        }

        var activeTenants = []
        if (leases.length) {
          var tenantIds = leases.map(function(l) { return l.tenant_id })
            .filter(function(id, i, a) { return a.indexOf(id) === i })
          var tRes = await RM.db.from('profiles').select('id,name').in('id', tenantIds).order('name')
          activeTenants = tRes.data ?? []
        }

        var rentRecords = []
        if (leases.length) {
          var now = new Date()
          var m0  = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0]
          var m1  = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0]
          var lIds = leases.map(function(l) { return l.id })
          var rRes = await RM.db.from('rent_records').select('*').in('lease_id', lIds).gte('due_date', m0).lte('due_date', m1)
          rentRecords = rRes.data ?? []
        }

        var totalDue  = rentRecords.reduce(function(s, r) { return s + (+r.amount_due  || 0) }, 0)
        var totalPaid = rentRecords.reduce(function(s, r) { return s + (+r.amount_paid || 0) }, 0)
        var occupied  = leases.length
        var totalRooms = rooms.length

        var locale = getLang() === 'de' ? 'de-DE' : 'en-GB'
        var today  = new Date().toLocaleDateString(locale, { weekday:'long', year:'numeric', month:'long', day:'numeric' })

        document.getElementById('content').innerHTML =
          '<div class="mb-8">' +
            '<h1 class="text-2xl font-bold text-gray-900">' + t('dashboard') + '</h1>' +
            '<p class="text-gray-500 text-sm mt-1">' + today + '</p>' +
          '</div>' +

          '<div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-10">' +
            stat('🏠', t('total_houses'),             houses.length,                   'bg-indigo-50', 'text-indigo-600') +
            stat('🚪', t('occupied_rooms'),            occupied + ' / ' + totalRooms,   'bg-blue-50',   'text-blue-600') +
            stat('📋', t('rent_due_this_month'),       formatCurrency(totalDue),         'bg-amber-50',  'text-amber-600') +
            stat('✅', t('rent_collected_this_month'),  formatCurrency(totalPaid),        'bg-emerald-50','text-emerald-600') +
          '</div>' +

          '<div>' +
            '<div class="flex items-center justify-between mb-4">' +
              '<h2 class="text-base font-semibold text-gray-900">' + t('houses') + '</h2>' +
              '<a href="houses.html" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">' + t('add_house') + ' →</a>' +
            '</div>' +
            (houses.length === 0
              ? '<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center">' +
                  '<p class="text-gray-500 mb-4">' + t('no_houses') + '</p>' +
                  '<a href="houses.html" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition">' + t('add_house') + '</a>' +
                '</div>'
              : '<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">' +
                  houses.map(function(h) {
                    var hRooms  = rooms.filter(function(r) { return r.house_id === h.id })
                    var hLeases = leases.filter(function(l) { return hRooms.some(function(r) { return r.id === l.room_id }) })
                    return '<a href="house-detail.html?id=' + h.id + '" class="bg-white rounded-2xl border border-gray-200 p-5 hover:border-indigo-300 hover:shadow-sm transition block group">' +
                      '<div class="flex items-start justify-between mb-4">' +
                        '<div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 text-xl">🏠</div>' +
                        '<span class="text-xs font-medium px-2.5 py-1 rounded-full ' + (hLeases.length > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500') + '">' +
                          hLeases.length + '/' + hRooms.length + ' ' + t('occupied') +
                        '</span>' +
                      '</div>' +
                      '<h3 class="font-semibold text-gray-900 group-hover:text-indigo-700">' + h.name + '</h3>' +
                      '<p class="text-xs text-gray-500 mt-1">' + h.address + ', ' + h.city + '</p>' +
                    '</a>'
                  }).join('') +
                '</div>') +
          '</div>' +

          '<div class="mt-10">' +
            '<h2 class="text-base font-semibold text-gray-900 mb-4">&#10024; ' + t('ai_assistant') + '</h2>' +
            '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">' +

              '<div class="bg-white rounded-2xl border border-gray-200 p-5">' +
                '<div class="flex items-center gap-3 mb-4">' +
                  '<div class="w-9 h-9 bg-violet-50 rounded-xl flex items-center justify-center text-lg">&#128202;</div>' +
                  '<span class="text-sm font-semibold text-gray-900">' + t('ai_portfolio_insights') + '</span>' +
                '</div>' +
                '<button id="btn-insights" onclick="callAI(\'portfolio_insights\')" class="' + RM.btnP + ' w-full">' + t('ai_get_insights') + '</button>' +
                '<div id="result-insights" class="hidden mt-4"></div>' +
              '</div>' +

              '<div class="bg-white rounded-2xl border border-gray-200 p-5">' +
                '<div class="flex items-center gap-3 mb-4">' +
                  '<div class="w-9 h-9 bg-blue-50 rounded-xl flex items-center justify-center text-lg">&#9993;&#65039;</div>' +
                  '<span class="text-sm font-semibold text-gray-900">' + t('ai_draft_message') + '</span>' +
                '</div>' +
                (activeTenants.length === 0
                  ? '<p class="text-sm text-gray-400">' + t('ai_no_tenants') + '</p>'
                  : '<div class="space-y-3">' +
                      '<select id="ai-tenant" class="' + RM.inp + '">' +
                        '<option value="">' + t('ai_select_tenant') + '</option>' +
                        activeTenants.map(function(tn) { return '<option value="' + tn.id + '">' + RM.escHtml(tn.name) + '</option>' }).join('') +
                      '</select>' +
                      '<textarea id="ai-instructions" rows="2" placeholder="' + t('ai_instructions_hint') + '" class="' + RM.inp + '"></textarea>' +
                      '<button id="btn-draft" onclick="callAI(\'draft_message\')" class="' + RM.btnP + ' w-full">' + t('ai_generate_draft') + '</button>' +
                    '</div>') +
                '<div id="result-draft" class="hidden mt-4"></div>' +
              '</div>' +

              '<div class="bg-white rounded-2xl border border-gray-200 p-5">' +
                '<div class="flex items-center gap-3 mb-4">' +
                  '<div class="w-9 h-9 bg-amber-50 rounded-xl flex items-center justify-center text-lg">&#128179;</div>' +
                  '<span class="text-sm font-semibold text-gray-900">' + t('ai_rent_analysis') + '</span>' +
                '</div>' +
                '<button id="btn-analysis" onclick="callAI(\'rent_analysis\')" class="' + RM.btnP + ' w-full">' + t('ai_analyze') + '</button>' +
                '<div id="result-analysis" class="hidden mt-4"></div>' +
              '</div>' +

            '</div>' +
          '</div>'
      }

      function stat(icon, label, value, bg, text) {
        return '<div class="bg-white rounded-2xl border border-gray-200 p-5">' +
          '<div class="flex items-center gap-3 mb-2">' +
            '<div class="w-9 h-9 ' + bg + ' rounded-xl flex items-center justify-center text-lg">' + icon + '</div>' +
            '<span class="text-xs text-gray-500 font-medium">' + label + '</span>' +
          '</div>' +
          '<div class="text-xl font-bold text-gray-900 ' + text + '">' + value + '</div>' +
        '</div>'
      }

      window.callAI = async function(type) {
        var btnMap    = { portfolio_insights: 'btn-insights', draft_message: 'btn-draft', rent_analysis: 'btn-analysis' }
        var resultMap = { portfolio_insights: 'result-insights', draft_message: 'result-draft', rent_analysis: 'result-analysis' }
        var labelMap  = { portfolio_insights: t('ai_get_insights'), draft_message: t('ai_generate_draft'), rent_analysis: t('ai_analyze') }

        var btn    = document.getElementById(btnMap[type])
        var result = document.getElementById(resultMap[type])
        if (!btn || !result) return

        var tenantId = null, instructions = ''
        if (type === 'draft_message') {
          var sel = document.getElementById('ai-tenant')
          if (!sel || !sel.value) { RM.toast(t('ai_select_tenant'), 'error'); return }
          tenantId     = sel.value
          instructions = (document.getElementById('ai-instructions') ? document.getElementById('ai-instructions').value : '').trim()
        }

        btn.disabled    = true
        btn.textContent = t('ai_generating')
        result.className = 'hidden mt-4'

        try {
          var sessionRes = await RM.db.auth.getSession()
          if (!sessionRes.data || !sessionRes.data.session || !sessionRes.data.session.access_token) {
            RM.toast('Authentication required. Please log in again.', 'error'); return
          }

          var body = { type: type }
          if (tenantId)     body.tenant_id    = tenantId
          if (instructions) body.instructions = instructions

          var res = await fetch(RM.SUPABASE_URL + '/functions/v1/ai-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionRes.data.session.access_token },
            body: JSON.stringify(body),
          })

          var resBody = await res.json().catch(function() { return { error: res.status + ' ' + res.statusText } })

          if (!res.ok) {
            result.className = 'mt-4'
            result.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">' + RM.escHtml(resBody.error || t('error')) + '</div>'
            return
          }

          var text = resBody.content || ''
          result.className = 'mt-4'
          result.innerHTML =
            '<div class="bg-gray-50 border border-gray-200 rounded-xl p-4">' +
              '<p class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">' + RM.escHtml(text) + '</p>' +
              '<button onclick="copyAIResult(this)" data-text="' + RM.escHtml(text) + '" class="mt-3 text-xs px-3 py-1.5 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition">' + t('ai_copy') + '</button>' +
            '</div>'

        } catch (err) {
          result.className = 'mt-4'
          result.innerHTML = '<div class="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">' + RM.escHtml(String(err)) + '</div>'
          console.error('AI card error:', err)
        } finally {
          btn.disabled    = false
          btn.textContent = labelMap[type]
        }
      }

      window.copyAIResult = function(btn) {
        var text = btn.getAttribute('data-text')
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = t('ai_copied')
          setTimeout(function() { btn.textContent = t('ai_copy') }, 2000)
        }).catch(function() { RM.toast(t('error'), 'error') })
      }

      try {
        await load()
      } catch (err) {
        RM.showPageError(err)
      }
    })()
  </script>
</body>
</html>
