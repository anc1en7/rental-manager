<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — RentManager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, formatCurrency = RM.formatCurrency, getLang = RM.getLang

      var user = await RM.setupOwnerPage('dashboard')
      if (!user) return

      async function load() {
        var housesRes = await RM.db.from('houses').select('id,name,address,city').eq('owner_id', user.id)
        var roomsRes  = await RM.db.from('rooms').select('id,house_id,monthly_rent')

        var houses  = housesRes.data ?? []
        var rooms   = roomsRes.data  ?? []
        var roomIds = rooms.map(function(r) { return r.id })

        var leases = []
        if (roomIds.length) {
          var lRes = await RM.db.from('leases').select('id,room_id,monthly_rent,tenant_id').eq('status','active').in('room_id', roomIds)
          leases = lRes.data ?? []
        }

        var rentRecords = []
        if (leases.length) {
          var now = new Date()
          var m0  = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0]
          var m1  = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0]
          var lIds = leases.map(function(l) { return l.id })
          var rRes = await RM.db.from('rent_records').select('*').in('lease_id', lIds).gte('due_date', m0).lte('due_date', m1)
          rentRecords = rRes.data ?? []
        }

        var totalDue  = rentRecords.reduce(function(s, r) { return s + (+r.amount_due  || 0) }, 0)
        var totalPaid = rentRecords.reduce(function(s, r) { return s + (+r.amount_paid || 0) }, 0)
        var occupied  = leases.length
        var totalRooms = rooms.length

        var locale = getLang() === 'de' ? 'de-DE' : 'en-GB'
        var today  = new Date().toLocaleDateString(locale, { weekday:'long', year:'numeric', month:'long', day:'numeric' })

        document.getElementById('content').innerHTML =
          '<div class="mb-8">' +
            '<h1 class="text-2xl font-bold text-gray-900">' + t('dashboard') + '</h1>' +
            '<p class="text-gray-500 text-sm mt-1">' + today + '</p>' +
          '</div>' +

          '<div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-10">' +
            stat('🏠', t('total_houses'),             houses.length,                   'bg-indigo-50', 'text-indigo-600') +
            stat('🚪', t('occupied_rooms'),            occupied + ' / ' + totalRooms,   'bg-blue-50',   'text-blue-600') +
            stat('📋', t('rent_due_this_month'),       formatCurrency(totalDue),         'bg-amber-50',  'text-amber-600') +
            stat('✅', t('rent_collected_this_month'),  formatCurrency(totalPaid),        'bg-emerald-50','text-emerald-600') +
          '</div>' +

          '<div>' +
            '<div class="flex items-center justify-between mb-4">' +
              '<h2 class="text-base font-semibold text-gray-900">' + t('houses') + '</h2>' +
              '<a href="houses.html" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">' + t('add_house') + ' →</a>' +
            '</div>' +
            (houses.length === 0
              ? '<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-10 text-center">' +
                  '<p class="text-gray-500 mb-4">' + t('no_houses') + '</p>' +
                  '<a href="houses.html" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition">' + t('add_house') + '</a>' +
                '</div>'
              : '<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">' +
                  houses.map(function(h) {
                    var hRooms  = rooms.filter(function(r) { return r.house_id === h.id })
                    var hLeases = leases.filter(function(l) { return hRooms.some(function(r) { return r.id === l.room_id }) })
                    return '<a href="house-detail.html?id=' + h.id + '" class="bg-white rounded-2xl border border-gray-200 p-5 hover:border-indigo-300 hover:shadow-sm transition block group">' +
                      '<div class="flex items-start justify-between mb-4">' +
                        '<div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 text-xl">🏠</div>' +
                        '<span class="text-xs font-medium px-2.5 py-1 rounded-full ' + (hLeases.length > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500') + '">' +
                          hLeases.length + '/' + hRooms.length + ' ' + t('occupied') +
                        '</span>' +
                      '</div>' +
                      '<h3 class="font-semibold text-gray-900 group-hover:text-indigo-700">' + h.name + '</h3>' +
                      '<p class="text-xs text-gray-500 mt-1">' + h.address + ', ' + h.city + '</p>' +
                    '</a>'
                  }).join('') +
                '</div>') +
          '</div>'
      }

      function stat(icon, label, value, bg, text) {
        return '<div class="bg-white rounded-2xl border border-gray-200 p-5">' +
          '<div class="flex items-center gap-3 mb-2">' +
            '<div class="w-9 h-9 ' + bg + ' rounded-xl flex items-center justify-center text-lg">' + icon + '</div>' +
            '<span class="text-xs text-gray-500 font-medium">' + label + '</span>' +
          '</div>' +
          '<div class="text-xl font-bold text-gray-900 ' + text + '">' + value + '</div>' +
        '</div>'
      }

      try {
        await load()
      } catch (err) {
        RM.showPageError(err)
      }
    })()
  </script>
</body>
</html>
