<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>Tenants — RentManager</title>
  <script src="../js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, inp = RM.inp, lbl = RM.lbl, btnP = RM.btnP, btnS = RM.btnS
      var formatCurrency = RM.formatCurrency, formatDate = RM.formatDate

      var user = await RM.setupOwnerPage('tenants')
      if (!user) return

      var _tenantMap = {}

      async function load() {
        // Fetch all tenant profiles first
        var pRes      = await RM.db.from('profiles').select('id,name').eq('role','tenant').order('name')
        var allTenants = pRes.data ?? []
        _tenantMap = Object.fromEntries(allTenants.map(function(p) { return [p.id, p.name] }))

        // Fetch owner's houses + rooms + active leases to build lease map
        var housesRes = await RM.db.from('houses').select('id,name').eq('owner_id', user.id)
        var houses    = housesRes.data ?? []
        var houseIds  = houses.map(function(h) { return h.id })
        var houseMap  = Object.fromEntries(houses.map(function(h) { return [h.id, h.name] }))

        var leaseByTenant = {}
        if (houseIds.length) {
          var roomsRes = await RM.db.from('rooms').select('id,house_id,room_number').in('house_id', houseIds)
          var rooms    = roomsRes.data ?? []
          var roomMap  = Object.fromEntries(rooms.map(function(r) { return [r.id, r] }))

          if (rooms.length) {
            var leasesRes = await RM.db.from('leases')
              .select('id,tenant_id,room_id,start_date,end_date,monthly_rent')
              .in('room_id', rooms.map(function(r) { return r.id }))
              .eq('status','active')
            var leases = leasesRes.data ?? []
            leases.forEach(function(l) {
              var room = roomMap[l.room_id]
              leaseByTenant[l.tenant_id] = {
                house:        room ? houseMap[room.house_id] : '—',
                room_number:  room ? room.room_number : '—',
                start_date:   l.start_date,
                end_date:     l.end_date,
                monthly_rent: l.monthly_rent,
                room_id:      l.room_id,
              }
            })
          }
        }

        // Merge: every tenant gets a row, lease info where it exists
        var rows = allTenants.map(function(p) {
          var lease = leaseByTenant[p.id]
          return {
            tenant_id:    p.id,
            name:         p.name,
            assigned:     !!lease,
            house:        lease ? lease.house       : '—',
            room_number:  lease ? lease.room_number : '—',
            start_date:   lease ? lease.start_date  : null,
            end_date:     lease ? lease.end_date    : null,
            monthly_rent: lease ? lease.monthly_rent : null,
            room_id:      lease ? lease.room_id     : null,
          }
        })

        document.getElementById('content').innerHTML =
          '<div class="flex items-center justify-between mb-8">' +
            '<h1 class="text-2xl font-bold text-gray-900">' + t('tenants') + '</h1>' +
            '<button onclick="showInvite()" class="' + btnP + '">' + t('add_tenant') + '</button>' +
          '</div>' +

          (!rows.length
            ? '<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-12 text-center">' +
                '<div class="text-4xl mb-4">👤</div>' +
                '<p class="text-gray-500">' + t('no_tenants') + '</p>' +
                '<button onclick="showInvite()" class="' + btnP + ' mt-5">' + t('add_tenant') + '</button>' +
              '</div>'
            : '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">' +
                '<table class="w-full text-sm">' +
                  '<thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">' +
                    '<tr>' +
                      '<th class="px-6 py-3 text-left">' + t('name') + '</th>' +
                      '<th class="px-6 py-3 text-left">' + t('status') + '</th>' +
                      '<th class="px-6 py-3 text-left">' + t('house_label') + '</th>' +
                      '<th class="px-6 py-3 text-left">' + t('room_label') + '</th>' +
                      '<th class="px-6 py-3 text-left">' + t('lease_period') + '</th>' +
                      '<th class="px-6 py-3 text-right">' + t('monthly_rent') + '</th>' +
                      '<th class="px-6 py-3 text-center">' + t('actions') + '</th>' +
                    '</tr>' +
                  '</thead>' +
                  '<tbody class="divide-y divide-gray-100">' +
                    rows.map(function(r) {
                      return '<tr class="hover:bg-gray-50">' +
                        '<td class="px-6 py-4 font-medium text-gray-900">' +
                          '<div class="flex items-center gap-2">' +
                            '<div class="w-7 h-7 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 text-xs font-bold">' + r.name.charAt(0).toUpperCase() + '</div>' +
                            r.name +
                          '</div>' +
                        '</td>' +
                        '<td class="px-6 py-4">' +
                          (r.assigned
                            ? '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">' + t('active') + '</span>'
                            : '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">Unassigned</span>') +
                        '</td>' +
                        '<td class="px-6 py-4 text-gray-600">' + r.house + '</td>' +
                        '<td class="px-6 py-4 text-gray-600">' + r.room_number + '</td>' +
                        '<td class="px-6 py-4 text-gray-600 text-xs">' + (r.start_date ? formatDate(r.start_date) + ' → ' + formatDate(r.end_date) : '—') + '</td>' +
                        '<td class="px-6 py-4 text-right font-medium text-indigo-700">' + (r.monthly_rent ? formatCurrency(r.monthly_rent) : '—') + '</td>' +
                        '<td class="px-6 py-4">' +
                          '<div class="flex items-center justify-center gap-2">' +
                            (r.assigned
                              ? '<a href="room-detail.html?id=' + r.room_id + '" class="text-xs px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg font-medium transition">' + t('view_room') + '</a>'
                              : '<button onclick="showAssignTenant(\'' + r.tenant_id + '\')" class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 text-gray-700 hover:text-indigo-700 rounded-lg font-medium transition">' + t('assign_tenant') + '</button>') +
                            '<button onclick="confirmDeleteTenant(\'' + r.tenant_id + '\')" class="text-xs px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg font-medium transition">' + t('delete') + '</button>' +
                          '</div>' +
                        '</td>' +
                      '</tr>'
                    }).join('') +
                  '</tbody>' +
                '</table>' +
              '</div>')
      }

      window.showInvite = function() {
        RM.openModal(t('add_tenant'),
          '<div class="bg-blue-50 text-blue-800 text-sm px-4 py-3 rounded-xl mb-2">ℹ️ ' + t('tenant_invite_info') + '</div>' +
          '<div><label class="' + lbl + '">' + t('tenant_name') + ' *</label>' +
            '<input id="f-name" class="' + inp + '" placeholder="Anna Müller"/></div>' +
          '<div><label class="' + lbl + '">' + t('tenant_email') + ' *</label>' +
            '<input id="f-email" type="email" class="' + inp + '" placeholder="tenant@example.com"/></div>',
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="inviteTenant()" class="' + btnP + '">' + t('add_tenant') + '</button>')
      }

      window.inviteTenant = async function() {
        var name  = document.getElementById('f-name').value.trim()
        var email = document.getElementById('f-email').value.trim()
        if (!name || !email) { RM.toast(t('error'), 'error'); return }

        var sessionRes = await RM.db.auth.getSession()
        if (!sessionRes.data || !sessionRes.data.session || !sessionRes.data.session.access_token) {
          console.error('No valid Supabase session found for inviteTenant', sessionRes)
          RM.toast('Authentication required. Please log in again.', 'error')
          return
        }

        try {
          var res = await fetch(RM.SUPABASE_URL + '/functions/v1/create-tenant', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + sessionRes.data.session.access_token,
            },
            body: JSON.stringify({ name: name, email: email, redirectTo: RM.indexUrl() }),
          })
          if (!res.ok) {
            var body = await res.json().catch(function() { return { error: String(res.status) + ' ' + res.statusText } })
            console.error('create-tenant failed', res.status, body)
            RM.toast(body.error ?? t('error'), 'error')
            return
          }
          RM.toast(t('success'))
          RM.closeModal()
          await load()
        } catch(err) {
          RM.toast(t('error'), 'error')
          console.error(err)
        }
      }

      window.showAssignTenant = async function(tenantId) {
        var housesRes = await RM.db.from('houses').select('id,name').eq('owner_id', user.id).order('name')
        var houses = housesRes.data ?? []
        if (!houses.length) { RM.toast(t('error'), 'error'); return }
        var houseOptions = houses.map(function(h) { return '<option value="' + h.id + '">' + h.name + '</option>' }).join('')
        var today = new Date().toISOString().split('T')[0]
        var tenantName = _tenantMap[tenantId] || ''
        RM.openModal(t('assign_tenant') + (tenantName ? ' — ' + tenantName : ''),
          '<div><label class="' + lbl + '">' + t('house_label') + ' *</label>' +
            '<select id="f-house" class="' + inp + '" onchange="loadRoomsForHouse(this.value)">' +
              '<option value="">' + t('house_label') + '</option>' + houseOptions +
            '</select></div>' +
          '<div><label class="' + lbl + '">Room *</label>' +
            '<select id="f-room" class="' + inp + '"><option value="">Select a house first</option></select></div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('start_date') + ' *</label>' +
              '<input id="f-start" type="date" class="' + inp + '" value="' + today + '"/></div>' +
            '<div><label class="' + lbl + '">' + t('end_date') + ' *</label>' +
              '<input id="f-end" type="date" class="' + inp + '"/></div>' +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('monthly_rent') + ' *</label>' +
              '<input id="f-rent" type="number" step="0.01" class="' + inp + '"/></div>' +
            '<div><label class="' + lbl + '">' + t('rent_due_day') + '</label>' +
              '<input id="f-day" type="number" min="1" max="28" class="' + inp + '" value="1"/></div>' +
          '</div>',
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="saveAssignTenant(\'' + tenantId + '\')" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.loadRoomsForHouse = async function(houseId) {
        var roomSelect = document.getElementById('f-room')
        roomSelect.innerHTML = '<option value="">Loading…</option>'
        if (!houseId) { roomSelect.innerHTML = '<option value="">Select a house first</option>'; return }
        var roomsRes = await RM.db.from('rooms').select('id,room_number,monthly_rent').eq('house_id', houseId).order('room_number')
        var rooms = roomsRes.data ?? []
        if (!rooms.length) { roomSelect.innerHTML = '<option value="">No rooms in this house</option>'; return }
        var occupiedRes = await RM.db.from('leases').select('room_id').in('room_id', rooms.map(function(r) { return r.id })).eq('status','active')
        var occupiedIds = new Set((occupiedRes.data ?? []).map(function(l) { return l.room_id }))
        var available = rooms.filter(function(r) { return !occupiedIds.has(r.id) })
        if (!available.length) { roomSelect.innerHTML = '<option value="">No available rooms</option>'; return }
        roomSelect.innerHTML = '<option value="">Select room</option>' +
          available.map(function(r) { return '<option value="' + r.id + '" data-rent="' + (r.monthly_rent || '') + '">Room ' + r.room_number + '</option>' }).join('')
        roomSelect.onchange = function() {
          var rent = roomSelect.options[roomSelect.selectedIndex].dataset.rent
          if (rent) document.getElementById('f-rent').value = rent
        }
      }

      window.saveAssignTenant = async function(tenantId) {
        var room_id      = document.getElementById('f-room').value
        var start_date   = document.getElementById('f-start').value
        var end_date     = document.getElementById('f-end').value
        var monthly_rent = parseFloat(document.getElementById('f-rent').value)
        var rent_due_day = parseInt(document.getElementById('f-day').value) || 1
        if (!room_id || !start_date || !end_date || isNaN(monthly_rent)) { RM.toast(t('error'), 'error'); return }
        if (new Date(end_date) <= new Date(start_date)) { RM.toast(t('error'), 'error'); return }
        var leaseRes = await RM.db.from('leases')
          .insert({ room_id: room_id, tenant_id: tenantId, start_date: start_date, end_date: end_date, monthly_rent: monthly_rent, rent_due_day: rent_due_day, status: 'active' })
          .select().single()
        if (leaseRes.error) { RM.toast(t('error'), 'error'); console.error(leaseRes.error); return }
        try {
          await RM.generateRentRecords(leaseRes.data.id, start_date, end_date, monthly_rent, rent_due_day)
        } catch(e) { console.error('rent record gen failed', e) }
        RM.toast(t('success'))
        RM.closeModal()
        await load()
      }

      window.confirmDeleteTenant = function(tenantId) {
        var name = _tenantMap[tenantId] || ''
        RM.openModal(t('delete_tenant'),
          '<p class="text-sm text-gray-600">' + t('delete_tenant_confirm') + '</p>' +
          (name ? '<p class="mt-3 font-semibold text-gray-900">' + RM.escHtml(name) + '</p>' : ''),
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="deleteTenant(\'' + tenantId + '\')" class="' + RM.btnD + '">' + t('delete') + '</button>')
      }

      window.deleteTenant = async function(tenantId) {
        var sessionRes = await RM.db.auth.getSession()
        if (!sessionRes.data || !sessionRes.data.session || !sessionRes.data.session.access_token) {
          RM.toast('Authentication required. Please log in again.', 'error')
          return
        }
        try {
          var res = await fetch(RM.SUPABASE_URL + '/functions/v1/delete-tenant', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + sessionRes.data.session.access_token,
            },
            body: JSON.stringify({ tenant_id: tenantId }),
          })
          if (!res.ok) {
            var body = await res.json().catch(function() { return { error: String(res.status) + ' ' + res.statusText } })
            if (body.error === 'tenant_has_active_lease') {
              RM.toast(t('delete_tenant_has_lease'), 'error')
            } else {
              RM.toast(body.error ?? t('error'), 'error')
            }
            return
          }
          RM.toast(t('success'))
          RM.closeModal()
          await load()
        } catch(err) {
          RM.toast(t('error'), 'error')
          console.error(err)
        }
      }

      await load()
    })()
</script>
</body>
</html>
