<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>House — RentManager</title>
  <script src="../js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, inp = RM.inp, lbl = RM.lbl, btnP = RM.btnP, btnS = RM.btnS, btnD = RM.btnD
      var formatCurrency = RM.formatCurrency, badge = RM.badge

      var houseId = new URLSearchParams(location.search).get('id')
      if (!houseId) { location.href = 'houses.html'; return }

      var user = await RM.setupOwnerPage('houses')
      if (!user) return

      async function load() {
        var houseRes = await RM.db.from('houses').select('*').eq('id', houseId).single()
        var roomsRes = await RM.db.from('rooms').select('*').eq('house_id', houseId).order('room_number')

        var house = houseRes.data
        if (!house || house.owner_id !== user.id) { location.href = 'houses.html'; return }
        var rooms = roomsRes.data ?? []

        var leaseMap = {}
        if (rooms.length) {
          var lRes = await RM.db.from('leases')
            .select('id,room_id,tenant_id,start_date,end_date,monthly_rent')
            .eq('status','active')
            .in('room_id', rooms.map(function(r) { return r.id }))
          var leases = lRes.data ?? []
          var tenantIds = []
          leases.forEach(function(l) { if (tenantIds.indexOf(l.tenant_id) === -1) tenantIds.push(l.tenant_id) })
          var profiles = []
          if (tenantIds.length) {
            var pRes = await RM.db.from('profiles').select('id,name').in('id', tenantIds)
            profiles = pRes.data ?? []
          }
          leases.forEach(function(l) {
            var profile = profiles.find(function(p) { return p.id === l.tenant_id })
            leaseMap[l.room_id] = Object.assign({}, l, { tenant_name: profile ? profile.name : '—' })
          })
        }

        document.getElementById('content').innerHTML =
          '<div class="flex items-start justify-between mb-8 gap-4">' +
            '<div>' +
              '<a href="houses.html" class="text-sm text-indigo-600 hover:text-indigo-700 mb-2 inline-block">← ' + t('houses') + '</a>' +
              '<h1 class="text-2xl font-bold text-gray-900">' + house.name + '</h1>' +
              '<p class="text-gray-500 text-sm mt-1">' + house.address + ', ' + house.city + ', ' + house.country + '</p>' +
            '</div>' +
            '<div class="flex gap-2 flex-shrink-0">' +
              '<button onclick="showShareModal()" class="' + btnS + ' flex items-center gap-1.5">' +
                '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
                t('share_property') +
              '</button>' +
              '<button onclick="showAddRoom()" class="' + btnP + '">' + t('add_room') + '</button>' +
            '</div>' +
          '</div>' +

          (!rooms.length
            ? '<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-12 text-center">' +
                '<div class="text-4xl mb-4">🚪</div>' +
                '<p class="text-gray-500">' + t('no_rooms') + '</p>' +
                '<button onclick="showAddRoom()" class="' + btnP + ' mt-5">' + t('add_room') + '</button>' +
              '</div>'
            : '<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">' +
                rooms.map(function(room) {
                  var lease = leaseMap[room.id]
                  var isOccupied = !!lease
                  return '<div class="bg-white rounded-2xl border border-gray-200 flex flex-col overflow-hidden hover:shadow-sm transition">' +
                    (room.image_url ? '<img src="' + room.image_url + '" class="w-full h-36 object-cover"/>' : '') +
                    '<a href="room-detail.html?id=' + room.id + '" class="flex-1 p-5 block group">' +
                      '<div class="flex items-start justify-between mb-3">' +
                        (room.image_url ? '' : '<div class="w-9 h-9 bg-indigo-100 rounded-xl flex items-center justify-center text-lg">🚪</div>') +
                        badge(isOccupied ? 'occupied' : 'vacant') +
                      '</div>' +
                      '<h3 class="font-semibold text-gray-900 group-hover:text-indigo-700">' + t('room_label') + ' ' + room.room_number + '</h3>' +
                      '<p class="text-xs text-gray-500 mt-1">' + t('floor_label') + ' ' + room.floor + (room.area_sqm ? ' · ' + room.area_sqm + ' m²' : '') + '</p>' +
                      '<p class="text-sm font-semibold text-indigo-700 mt-2">' + formatCurrency(room.monthly_rent) + ' ' + t('per_month') + '</p>' +
                      (isOccupied ? '<p class="text-xs text-gray-500 mt-1">👤 ' + lease.tenant_name + '</p>' : '') +
                      (room.utilities_included ? '<p class="text-xs text-emerald-600 mt-1">✓ ' + t('utilities_included') + '</p>' : '') +
                    '</a>' +
                    '<div class="flex border-t border-gray-100">' +
                      '<button onclick=\'editRoom(' + JSON.stringify(room) + ')\' class="flex-1 text-xs py-2.5 text-indigo-600 hover:bg-indigo-50 font-medium transition">' + t('edit') + '</button>' +
                      '<button onclick="deleteRoom(\'' + room.id + '\')" class="flex-1 text-xs py-2.5 text-red-600 hover:bg-red-50 font-medium transition border-l border-gray-100">' + t('delete') + '</button>' +
                    '</div>' +
                  '</div>'
                }).join('') +
              '</div>')
      }

      function roomForm(r) {
        r = r || {}
        var checked = r.utilities_included ? 'checked' : ''
        return '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('room_number') + ' *</label>' +
              '<input id="f-num" class="' + inp + '" value="' + (r.room_number ?? '') + '" placeholder="101"/></div>' +
            '<div><label class="' + lbl + '">' + t('floor') + '</label>' +
              '<input id="f-floor" type="number" class="' + inp + '" value="' + (r.floor ?? 0) + '"/></div>' +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('area_sqm') + '</label>' +
              '<input id="f-area" type="number" step="0.01" class="' + inp + '" value="' + (r.area_sqm ?? '') + '"/></div>' +
            '<div><label class="' + lbl + '">' + t('monthly_rent') + ' *</label>' +
              '<input id="f-rent" type="number" step="0.01" class="' + inp + '" value="' + (r.monthly_rent ?? '') + '"/></div>' +
          '</div>' +
          '<div class="flex items-center gap-3">' +
            '<input id="f-utils" type="checkbox" class="rounded text-indigo-600" ' + checked + '/>' +
            '<label for="f-utils" class="text-sm text-gray-700">' + t('utilities_included') + '</label>' +
          '</div>' +
          '<div><label class="' + lbl + '">' + t('utility_details') + '</label>' +
            '<input id="f-util-det" class="' + inp + '" value="' + (r.utility_details ?? '') + '" placeholder="e.g. Water &amp; heating included"/></div>' +
          '<div><label class="' + lbl + '">' + t('description') + '</label>' +
            '<textarea id="f-desc" class="' + inp + '" rows="2">' + (r.description ?? '') + '</textarea></div>'
      }

      window.showAddRoom = function() {
        RM.openModal(t('add_room'), roomForm(),
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="saveRoom()" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.editRoom = function(r) {
        RM.openModal(t('edit_room'), roomForm(r),
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="saveRoom(\'' + r.id + '\')" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.saveRoom = async function(id) {
        var room_number  = document.getElementById('f-num').value.trim()
        var monthly_rent = parseFloat(document.getElementById('f-rent').value)
        if (!room_number || isNaN(monthly_rent)) { RM.toast(t('error'), 'error'); return }

        var payload = {
          house_id:           houseId,
          room_number:        room_number,
          floor:              parseInt(document.getElementById('f-floor').value) || 0,
          area_sqm:           parseFloat(document.getElementById('f-area').value) || null,
          monthly_rent:       monthly_rent,
          utilities_included: document.getElementById('f-utils').checked,
          utility_details:    document.getElementById('f-util-det').value.trim() || null,
          description:        document.getElementById('f-desc').value.trim() || null,
        }

        var res = id
          ? await RM.db.from('rooms').update(payload).eq('id', id)
          : await RM.db.from('rooms').insert(payload)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        RM.closeModal()
        await load()
      }

      window.deleteRoom = async function(id) {
        if (!confirm(t('delete_room_confirm'))) return
        var res = await RM.db.from('rooms').delete().eq('id', id)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        await load()
      }

      // ── Share feature ─────────────────────────────────────────────────

      var shareTab = 'public'

      function shareModalBody() {
        var tabActive   = 'flex-1 py-1.5 text-sm rounded-md font-medium transition bg-white shadow text-gray-900'
        var tabInactive = 'flex-1 py-1.5 text-sm rounded-md font-medium transition text-gray-500 hover:text-gray-700'
        return (
          // Type tabs
          '<div class="flex rounded-lg border border-gray-200 p-1 bg-gray-50">' +
            '<button id="sh-tab-public" onclick="setShareTab(\'public\')" class="' + tabActive + '">' + t('share_public') + '</button>' +
            '<button id="sh-tab-private" onclick="setShareTab(\'private\')" class="' + tabInactive + '">' + t('share_private') + '</button>' +
          '</div>' +
          '<p id="sh-desc" class="text-xs text-gray-500">' + t('share_public_desc') + '</p>' +

          // Password field (private only)
          '<div id="sh-pw-row" class="hidden">' +
            '<label class="' + lbl + '">' + t('share_access_password') + ' *</label>' +
            '<input id="sh-pw" type="password" autocomplete="new-password" class="' + inp + '" placeholder="' + t('share_password_placeholder') + '"/>' +
          '</div>' +

          // Show rent toggle
          '<div class="flex items-center gap-3">' +
            '<input id="sh-show-rent" type="checkbox" checked class="w-4 h-4 rounded text-indigo-600 border-gray-300 focus:ring-indigo-500"/>' +
            '<label for="sh-show-rent" class="text-sm text-gray-700 select-none cursor-pointer">' + t('share_show_rent') + '</label>' +
          '</div>' +

          // Expiry selector
          '<div>' +
            '<label class="' + lbl + '">' + t('share_link_expiry') + '</label>' +
            '<select id="sh-expiry" class="' + inp + '">' +
              '<option value="">' + t('share_expiry_never') + '</option>' +
              '<option value="7">'  + t('share_expiry_7d')  + '</option>' +
              '<option value="30">' + t('share_expiry_30d') + '</option>' +
              '<option value="90">' + t('share_expiry_90d') + '</option>' +
            '</select>' +
          '</div>' +

          // Generated link result
          '<div id="sh-result" class="hidden p-4 bg-indigo-50 rounded-xl border border-indigo-100">' +
            '<p class="text-xs font-semibold text-indigo-700 mb-2">✓ ' + t('share_link_generated') + '</p>' +
            '<div class="flex gap-2">' +
              '<input id="sh-url" readonly class="flex-1 text-xs bg-white border border-indigo-200 rounded-lg px-3 py-2 text-gray-700 min-w-0"/>' +
              '<button onclick="copyShareLink()" id="sh-copy-btn" class="px-3 py-2 rounded-lg text-xs font-medium bg-indigo-600 hover:bg-indigo-700 text-white transition flex-shrink-0">' + t('share_copy') + '</button>' +
            '</div>' +
          '</div>' +

          // Active links
          '<div class="pt-3 border-t border-gray-100">' +
            '<p class="text-sm font-semibold text-gray-900 mb-3">' + t('share_active_links') + '</p>' +
            '<div id="sh-active"><p class="text-xs text-gray-400">' + t('loading') + '</p></div>' +
          '</div>'
        )
      }

      window.showShareModal = function() {
        shareTab = 'public'
        RM.openModal(
          t('share_property'),
          shareModalBody(),
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('close') + '</button>' +
          ' <button id="sh-gen-btn" onclick="generateShareLink()" class="' + btnP + '">' + t('share_generate') + '</button>'
        )
        loadActiveShares()
      }

      window.setShareTab = function(tab) {
        shareTab = tab
        var tabActive   = 'flex-1 py-1.5 text-sm rounded-md font-medium transition bg-white shadow text-gray-900'
        var tabInactive = 'flex-1 py-1.5 text-sm rounded-md font-medium transition text-gray-500 hover:text-gray-700'
        document.getElementById('sh-tab-public').className  = tab === 'public'  ? tabActive : tabInactive
        document.getElementById('sh-tab-private').className = tab === 'private' ? tabActive : tabInactive
        document.getElementById('sh-desc').textContent = tab === 'public' ? t('share_public_desc') : t('share_private_desc')
        document.getElementById('sh-pw-row').classList.toggle('hidden', tab !== 'private')
        document.getElementById('sh-result').classList.add('hidden')
      }

      window.generateShareLink = async function() {
        var pw      = (document.getElementById('sh-pw') || {}).value || ''
        var btn     = document.getElementById('sh-gen-btn')
        var expDays = document.getElementById('sh-expiry').value
        var showR   = document.getElementById('sh-show-rent').checked

        if (shareTab === 'private' && !pw.trim()) {
          RM.toast(t('share_pw_required'), 'error')
          document.getElementById('sh-pw').focus()
          return
        }

        var expiresAt = null
        if (expDays) {
          var d = new Date()
          d.setDate(d.getDate() + parseInt(expDays))
          expiresAt = d.toISOString()
        }

        btn.textContent = t('share_generating')
        btn.disabled    = true

        var res = await RM.db.rpc('create_property_share', {
          p_house_id:   houseId,
          p_share_type: shareTab,
          p_password:   shareTab === 'private' ? pw.trim() : null,
          p_show_rent:  showR,
          p_expires_at: expiresAt
        })

        btn.textContent = t('share_generate')
        btn.disabled    = false

        if (res.error) { RM.toast(t('error'), 'error'); return }

        var token   = res.data
        var base    = window.location.pathname.replace(/\/(owner|tenant)\/[^/]*$/, '/')
        var shareUrl = window.location.origin + base + 'share.html?t=' + token

        document.getElementById('sh-url').value = shareUrl
        document.getElementById('sh-result').classList.remove('hidden')

        // Clear password field after generation
        if (shareTab === 'private') document.getElementById('sh-pw').value = ''

        RM.toast(t('share_link_generated'))
        await loadActiveShares()
      }

      window.copyShareLink = function() {
        var url = document.getElementById('sh-url').value
        var btn = document.getElementById('sh-copy-btn')
        var originalText = t('share_copy')

        function onCopied() {
          btn.textContent = t('share_copied')
          setTimeout(function() { btn.textContent = originalText }, 2000)
        }

        if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
          navigator.share({ url: url }).catch(function() {})
          return
        }
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(onCopied).catch(function() {
            document.getElementById('sh-url').select()
            document.execCommand('copy')
            onCopied()
          })
        } else {
          document.getElementById('sh-url').select()
          document.execCommand('copy')
          onCopied()
        }
      }

      async function loadActiveShares() {
        var container = document.getElementById('sh-active')
        if (!container) return

        var res = await RM.db.from('property_shares')
          .select('*')
          .eq('house_id', houseId)
          .order('created_at', { ascending: false })

        var shares = res.data || []

        if (!shares.length) {
          container.innerHTML = '<p class="text-xs text-gray-400">' + t('share_no_links') + '</p>'
          return
        }

        container.innerHTML = shares.map(function(s) {
          var isExpired = s.expires_at && new Date(s.expires_at) < new Date()
          var expiryText = s.expires_at
            ? (isExpired ? '⚠ ' : '') + t('share_expires') + ' ' + RM.formatDate(s.expires_at)
            : t('share_never_expires')
          var typeBadge = s.share_type === 'private'
            ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">🔒 ' + t('share_private') + '</span>'
            : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">🌐 ' + t('share_public') + '</span>'
          var rentBadge = s.show_rent
            ? ''
            : ' <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500">No rent</span>'

          return (
            '<div class="flex items-start justify-between py-2.5 border-b border-gray-100 last:border-0 gap-3">' +
              '<div class="min-w-0 flex-1">' +
                '<div class="flex items-center flex-wrap gap-1.5 mb-1">' + typeBadge + rentBadge + '</div>' +
                '<p class="text-xs ' + (isExpired ? 'text-red-500' : 'text-gray-500') + '">' + expiryText + '</p>' +
                '<p class="text-xs text-gray-400 mt-0.5">' +
                  s.view_count + ' ' + t('share_views') + ' · ' + RM.formatDate(s.created_at) +
                '</p>' +
              '</div>' +
              '<button onclick="revokeShare(\'' + s.id + '\')" class="text-xs text-red-600 hover:bg-red-50 px-2.5 py-1.5 rounded-lg font-medium transition flex-shrink-0">' +
                t('share_revoke') +
              '</button>' +
            '</div>'
          )
        }).join('')
      }

      window.revokeShare = async function(shareId) {
        if (!confirm(t('share_revoke_confirm'))) return
        var res = await RM.db.from('property_shares').delete().eq('id', shareId)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('share_revoked'))
        await loadActiveShares()
        // Hide result panel if it was showing the revoked link
        var resultEl = document.getElementById('sh-result')
        if (resultEl) resultEl.classList.add('hidden')
      }

      await load()
    })()
  </script>
</body>
</html>
