<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Houses — RentManager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, inp = RM.inp, lbl = RM.lbl, btnP = RM.btnP, btnS = RM.btnS

      var user = await RM.setupOwnerPage('houses')
      if (!user) return

      async function load() {
        var housesRes = await RM.db.from('houses').select('id,name,address,city,country').eq('owner_id', user.id).order('created_at')
        var houses    = housesRes.data ?? []
        var houseIds  = houses.map(function(h) { return h.id })

        var rooms = []
        if (houseIds.length) {
          var rRes = await RM.db.from('rooms').select('id,house_id').in('house_id', houseIds)
          rooms = rRes.data ?? []
        }
        var leases = []
        if (rooms.length) {
          var lRes = await RM.db.from('leases').select('id,room_id').eq('status','active').in('room_id', rooms.map(function(r) { return r.id }))
          leases = lRes.data ?? []
        }

        document.getElementById('content').innerHTML =
          '<div class="flex items-center justify-between mb-8">' +
            '<h1 class="text-2xl font-bold text-gray-900">' + t('houses') + '</h1>' +
            '<button onclick="showAddHouse()" class="' + btnP + '">' + t('add_house') + '</button>' +
          '</div>' +
          (!houses.length
            ? '<div class="bg-white rounded-2xl border border-dashed border-gray-300 p-12 text-center">' +
                '<div class="text-4xl mb-4">🏠</div>' +
                '<p class="text-gray-500">' + t('no_houses') + '</p>' +
                '<button onclick="showAddHouse()" class="' + btnP + ' mt-5">' + t('add_house') + '</button>' +
              '</div>'
            : '<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">' +
                houses.map(function(h) {
                  var total    = rooms.filter(function(r) { return r.house_id === h.id }).length
                  var occupied = leases.filter(function(l) { return rooms.some(function(r) { return r.id === l.room_id && r.house_id === h.id }) }).length
                  var hs = JSON.stringify(h).replace(/"/g, '&quot;')
                  var safeName = h.name.replace(/'/g, "\\'")
                  return '<div class="bg-white rounded-2xl border border-gray-200 flex flex-col overflow-hidden hover:shadow-sm transition">' +
                    '<a href="house-detail.html?id=' + h.id + '" class="flex-1 p-5 block group">' +
                      '<div class="flex items-start justify-between mb-3">' +
                        '<div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-xl">🏠</div>' +
                        '<span class="text-xs font-medium px-2.5 py-1 rounded-full ' + (occupied > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500') + '">' +
                          occupied + '/' + total + ' ' + t('occupied') +
                        '</span>' +
                      '</div>' +
                      '<h3 class="font-semibold text-gray-900 group-hover:text-indigo-700">' + h.name + '</h3>' +
                      '<p class="text-xs text-gray-500 mt-1">' + h.address + '</p>' +
                      '<p class="text-xs text-gray-500">' + h.city + ', ' + h.country + '</p>' +
                    '</a>' +
                    '<div class="flex border-t border-gray-100">' +
                      '<button onclick=\'editHouse(' + JSON.stringify(h) + ')\' class="flex-1 text-xs py-2.5 text-indigo-600 hover:bg-indigo-50 font-medium transition">' + t('edit') + '</button>' +
                      '<button onclick="deleteHouse(\'' + h.id + '\',\'' + safeName + '\')" class="flex-1 text-xs py-2.5 text-red-600 hover:bg-red-50 font-medium transition border-l border-gray-100">' + t('delete') + '</button>' +
                    '</div>' +
                  '</div>'
                }).join('') +
              '</div>')
      }

      function houseForm(h) {
        h = h || {}
        return '<div><label class="' + lbl + '">' + t('house_name') + ' *</label>' +
            '<input id="f-name" class="' + inp + '" value="' + (h.name ?? '') + '" placeholder="e.g. Musterstraße 12"/></div>' +
          '<div><label class="' + lbl + '">' + t('address') + ' *</label>' +
            '<input id="f-addr" class="' + inp + '" value="' + (h.address ?? '') + '" placeholder="e.g. Musterstraße 12, Apt 1"/></div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('city') + ' *</label>' +
              '<input id="f-city" class="' + inp + '" value="' + (h.city ?? '') + '" placeholder="Berlin"/></div>' +
            '<div><label class="' + lbl + '">' + t('country') + '</label>' +
              '<input id="f-country" class="' + inp + '" value="' + (h.country ?? 'Germany') + '" placeholder="Germany"/></div>' +
          '</div>'
      }

      window.showAddHouse = function() {
        RM.openModal(t('add_house'), houseForm(), '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button> <button onclick="saveHouse()" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.editHouse = function(h) {
        RM.openModal(t('edit_house'), houseForm(h), '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button> <button onclick="saveHouse(\'' + h.id + '\')" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.saveHouse = async function(id) {
        var name    = document.getElementById('f-name').value.trim()
        var address = document.getElementById('f-addr').value.trim()
        var city    = document.getElementById('f-city').value.trim()
        var country = document.getElementById('f-country').value.trim() || 'Germany'
        if (!name || !address || !city) { RM.toast(t('error'), 'error'); return }

        var payload = { name: name, address: address, city: city, country: country, owner_id: user.id }
        var res = id
          ? await RM.db.from('houses').update(payload).eq('id', id)
          : await RM.db.from('houses').insert(payload)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        RM.closeModal()
        await load()
      }

      window.deleteHouse = async function(id, name) {
        if (!confirm(t('delete_house_confirm') + '\n\n"' + name + '"')) return
        var res = await RM.db.from('houses').delete().eq('id', id)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        await load()
      }

      await load()
    })()
  </script>
</body>
</html>
