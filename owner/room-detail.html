<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>Room — RentManager</title>
  <script src="../js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="../js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex-shrink-0 flex flex-col"></aside>
    <main class="flex-1 p-8 min-w-0">
      <div id="content" class="text-gray-400 text-sm">Loading…</div>
    </main>
  </div>

  <script>
    (async function() {
      var t = RM.t, inp = RM.inp, lbl = RM.lbl, btnP = RM.btnP, btnS = RM.btnS, btnD = RM.btnD
      var formatCurrency = RM.formatCurrency, formatDate = RM.formatDate, badge = RM.badge

      var roomId = new URLSearchParams(location.search).get('id')
      if (!roomId) { location.href = 'houses.html'; return }

      var user = await RM.setupOwnerPage('houses')
      if (!user) return

      var _room, _house, _lease, _tenant, _records

      async function load() {
        var roomRes = await RM.db.from('rooms').select('*, house:houses(*)').eq('id', roomId).single()
        if (!roomRes.data) { location.href = 'houses.html'; return }
        if (roomRes.data.house.owner_id !== user.id) { location.href = 'houses.html'; return }
        _room  = roomRes.data
        _house = roomRes.data.house

        var lRes = await RM.db.from('leases')
          .select('*, tenant:profiles(id,name)')
          .eq('room_id', roomId)
          .eq('status', 'active')
          .order('created_at', { ascending: false })
          .limit(1)
        _lease  = lRes.data?.[0] ?? null
        _tenant = _lease?.tenant ?? null

        var allLeasesRes = await RM.db.from('leases').select('id').eq('room_id', roomId)
        _records = []
        if (allLeasesRes.data?.length) {
          var recRes = await RM.db.from('rent_records')
            .select('*, lease:leases(monthly_rent, tenant:profiles(name))')
            .in('lease_id', allLeasesRes.data.map(function(l) { return l.id }))
            .order('due_date', { ascending: false })
          _records = recRes.data ?? []
        }

        render()
      }

      function row(k, v) {
        return '<div class="flex justify-between gap-4"><span class="text-gray-500">' + k + '</span><span class="text-gray-900 text-right">' + v + '</span></div>'
      }

      function render() {
        var r = _room, h = _house, l = _lease

        var photoLabel = r.image_url ? t('change_photo') : t('upload_photo')

        document.getElementById('content').innerHTML =
          '<div class="flex items-center justify-between mb-6">' +
            '<div class="flex items-center gap-2 text-sm text-gray-500">' +
              '<a href="houses.html" class="hover:text-indigo-600">' + t('houses') + '</a>' +
              '<span>›</span>' +
              '<a href="house-detail.html?id=' + h.id + '" class="hover:text-indigo-600">' + h.name + '</a>' +
              '<span>›</span>' +
              '<span class="text-gray-900 font-medium">' + t('room_label') + ' ' + r.room_number + '</span>' +
            '</div>' +
            '<button onclick="showShareModal()" class="' + btnS + ' flex items-center gap-1.5 text-xs">' +
              '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
              t('share_property') +
            '</button>' +
          '</div>' +

          '<div class="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-6">' +
            '<div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">' +
              '<h2 class="text-sm font-semibold text-gray-900">' + t('room_photo') + '</h2>' +
              '<div class="flex gap-2">' +
                '<label for="photo-input" id="photo-label" class="cursor-pointer ' + btnS + ' text-xs">' + photoLabel + '</label>' +
                (r.image_url ? '<button onclick="removePhoto()" class="' + btnD + ' text-xs">' + t('remove_photo') + '</button>' : '') +
              '</div>' +
            '</div>' +
            (r.image_url
              ? '<img src="' + r.image_url + '" class="w-full max-h-72 object-cover"/>'
              : '<div class="flex items-center justify-center h-40 text-5xl text-gray-200">📷</div>') +
            '<input type="file" id="photo-input" accept="image/*" class="hidden" onchange="uploadPhoto(this)"/>' +
          '</div>' +

          '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">' +
            '<div class="lg:col-span-1 bg-white rounded-2xl border border-gray-200 p-6 space-y-3">' +
              '<h2 class="font-semibold text-gray-900 mb-1">' + t('room_label') + ' ' + r.room_number + '</h2>' +
              '<div class="space-y-2 text-sm">' +
                row(t('floor_label'),  r.floor) +
                row(t('area_sqm'),     r.area_sqm ? r.area_sqm + ' m²' : t('not_available')) +
                row(t('monthly_rent'), '<span class="font-semibold text-indigo-700">' + formatCurrency(r.monthly_rent) + '</span>') +
                row(t('utilities'),    r.utilities_included ? '<span class="text-emerald-600">✓ ' + t('yes') + '</span>' : t('no')) +
                (r.utility_details ? row(t('utility_details'), r.utility_details) : '') +
                (r.description ? row(t('description'), r.description) : '') +
              '</div>' +
            '</div>' +

            '<div class="lg:col-span-2 bg-white rounded-2xl border border-gray-200 p-6">' +
              '<div class="flex items-center justify-between mb-4">' +
                '<h2 class="font-semibold text-gray-900">' + t('current_tenant') + '</h2>' +
                (l
                  ? '<button onclick="confirmEndLease(\'' + l.id + '\')" class="' + btnD + ' text-xs">' + t('end_lease') + '</button>'
                  : '<button onclick="showCreateLease()" class="' + btnP + ' text-xs">' + t('assign_tenant') + '</button>') +
              '</div>' +
              (l
                ? '<div class="space-y-2 text-sm">' +
                    row('👤 ' + t('name'),  '<span class="font-medium">' + (_tenant?.name ?? '—') + '</span>') +
                    row(t('lease_start'),   formatDate(l.start_date)) +
                    row(t('lease_end'),     formatDate(l.end_date)) +
                    row(t('monthly_rent'),  formatCurrency(l.monthly_rent)) +
                    row(t('rent_due_day'),  l.rent_due_day + '. of month') +
                  '</div>'
                : '<div class="flex items-center justify-center h-24 text-gray-400 text-sm">' + t('no_lease') + '</div>') +
            '</div>' +
          '</div>' +

          '<div class="bg-white rounded-2xl border border-gray-200">' +
            '<div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">' +
              '<h2 class="font-semibold text-gray-900">' + t('rent_records') + '</h2>' +
              '<span class="text-xs text-gray-400">' + _records.length + ' records</span>' +
            '</div>' +
            (!_records.length
              ? '<div class="px-6 py-10 text-center text-gray-400 text-sm">' + t('no_rent_records') + '</div>'
              : '<div class="overflow-x-auto">' +
                  '<table class="w-full text-sm">' +
                    '<thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">' +
                      '<tr>' +
                        '<th class="px-6 py-3 text-left">' + t('due_date') + '</th>' +
                        '<th class="px-6 py-3 text-right">' + t('amount_due') + '</th>' +
                        '<th class="px-6 py-3 text-right">' + t('amount_paid') + '</th>' +
                        '<th class="px-6 py-3 text-center">' + t('status') + '</th>' +
                        '<th class="px-6 py-3 text-center">' + t('actions') + '</th>' +
                      '</tr>' +
                    '</thead>' +
                    '<tbody class="divide-y divide-gray-100">' +
                      _records.map(function(rec) {
                        return '<tr class="hover:bg-gray-50">' +
                          '<td class="px-6 py-3 font-medium">' + formatDate(rec.due_date) + '</td>' +
                          '<td class="px-6 py-3 text-right">' + formatCurrency(rec.amount_due) + '</td>' +
                          '<td class="px-6 py-3 text-right ' + (rec.status === 'paid' ? 'text-emerald-600 font-medium' : '') + '">' + formatCurrency(rec.amount_paid) + '</td>' +
                          '<td class="px-6 py-3 text-center">' + badge(rec.status) + '</td>' +
                          '<td class="px-6 py-3 text-center">' +
                            (rec.status !== 'paid'
                              ? '<button onclick="showPayment(\'' + rec.id + '\',' + rec.amount_due + ')" class="text-xs px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg font-medium transition">' + t('mark_as_paid') + '</button>'
                              : '<span class="text-xs text-gray-400">' + formatDate(rec.paid_at) + '</span>') +
                          '</td>' +
                        '</tr>'
                      }).join('') +
                    '</tbody>' +
                  '</table>' +
                '</div>') +
          '</div>'
      }

      window.showCreateLease = async function() {
        var allTenantsRes = await RM.db.from('profiles').select('id,name').eq('role','tenant').order('name')
        if (!allTenantsRes.data?.length) {
          RM.toast(t('no_tenants_for_lease'), 'info')
          return
        }
        var options = allTenantsRes.data.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>' }).join('')
        var today = new Date().toISOString().split('T')[0]
        RM.openModal(t('create_lease'),
          '<div><label class="' + lbl + '">' + t('select_tenant') + ' *</label>' +
            '<select id="f-tid" class="' + inp + '"><option value="">' + t('select_tenant') + '</option>' + options + '</select></div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('start_date') + ' *</label>' +
              '<input id="f-start" type="date" class="' + inp + '" value="' + today + '"/></div>' +
            '<div><label class="' + lbl + '">' + t('end_date') + ' *</label>' +
              '<input id="f-end" type="date" class="' + inp + '"/></div>' +
          '</div>' +
          '<div class="grid grid-cols-2 gap-3">' +
            '<div><label class="' + lbl + '">' + t('monthly_rent') + ' *</label>' +
              '<input id="f-rent" type="number" step="0.01" class="' + inp + '" value="' + _room.monthly_rent + '"/></div>' +
            '<div><label class="' + lbl + '">' + t('rent_due_day') + '</label>' +
              '<input id="f-day" type="number" min="1" max="28" class="' + inp + '" value="1"/>' +
              '<p class="text-xs text-gray-400 mt-1">' + t('rent_due_day_hint') + '</p>' +
            '</div>' +
          '</div>',
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="saveLease()" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.saveLease = async function() {
        var tenant_id    = document.getElementById('f-tid').value
        var start_date   = document.getElementById('f-start').value
        var end_date     = document.getElementById('f-end').value
        var monthly_rent = parseFloat(document.getElementById('f-rent').value)
        var rent_due_day = parseInt(document.getElementById('f-day').value) || 1
        if (!tenant_id || !start_date || !end_date || isNaN(monthly_rent)) { RM.toast(t('error'), 'error'); return }
        if (new Date(end_date) <= new Date(start_date)) { RM.toast(t('error'), 'error'); return }

        var leaseRes = await RM.db.from('leases')
          .insert({ room_id: roomId, tenant_id: tenant_id, start_date: start_date, end_date: end_date, monthly_rent: monthly_rent, rent_due_day: rent_due_day, status: 'active' })
          .select().single()
        if (leaseRes.error) { RM.toast(t('error'), 'error'); console.error(leaseRes.error); return }
        try {
          await RM.generateRentRecords(leaseRes.data.id, start_date, end_date, monthly_rent, rent_due_day)
        } catch(e) { console.error('rent record gen failed', e) }
        RM.toast(t('success'))
        RM.closeModal()
        await load()
      }

      window.confirmEndLease = async function(leaseId) {
        if (!confirm(t('end_lease_confirm'))) return
        var res = await RM.db.from('leases').update({ status: 'ended' }).eq('id', leaseId)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        await load()
      }

      window.showPayment = function(recId, amountDue) {
        RM.openModal(t('mark_as_paid'),
          '<div><label class="' + lbl + '">' + t('payment_amount') + ' *</label>' +
            '<input id="f-paid" type="number" step="0.01" class="' + inp + '" value="' + amountDue + '"/></div>' +
          '<div><label class="' + lbl + '">' + t('notes') + '</label>' +
            '<input id="f-notes" class="' + inp + '" placeholder="e.g. Bank transfer"/></div>',
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('cancel') + '</button>' +
          ' <button onclick="savePayment(\'' + recId + '\',' + amountDue + ')" class="' + btnP + '">' + t('save') + '</button>')
      }

      window.savePayment = async function(recId, amountDue) {
        var paid  = parseFloat(document.getElementById('f-paid').value)
        var notes = document.getElementById('f-notes').value.trim() || null
        if (isNaN(paid) || paid < 0) { RM.toast(t('error'), 'error'); return }
        var status = paid >= amountDue ? 'paid' : paid > 0 ? 'partial' : 'pending'
        var res = await RM.db.from('rent_records').update({
          amount_paid: paid, status: status, notes: notes, paid_at: paid > 0 ? new Date().toISOString() : null
        }).eq('id', recId)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('success'))
        RM.closeModal()
        await load()
      }

      window.uploadPhoto = async function(input) {
        var file = input.files[0]
        if (!file) return
        if (file.size > 5 * 1024 * 1024) { RM.toast(t('photo_too_large'), 'error'); return }
        var label = document.getElementById('photo-label')
        label.textContent = t('photo_uploading')

        var { error: upErr } = await RM.db.storage
          .from('room-images').upload(roomId, file, { upsert: true })
        if (upErr) { RM.toast(upErr.message, 'error'); label.textContent = t('upload_photo'); return }

        var { data: urlData } = RM.db.storage.from('room-images').getPublicUrl(roomId)
        var url = urlData.publicUrl + '?v=' + Date.now()
        var { error: dbErr } = await RM.db.from('rooms').update({ image_url: url }).eq('id', roomId)
        if (dbErr) { RM.toast(dbErr.message, 'error'); return }

        _room.image_url = url
        RM.toast(t('success'))
        render()
      }

      window.removePhoto = async function() {
        if (!confirm(t('remove_photo') + '?')) return
        await RM.db.storage.from('room-images').remove([roomId])
        await RM.db.from('rooms').update({ image_url: null }).eq('id', roomId)
        _room.image_url = null
        RM.toast(t('success'))
        render()
      }

      // ── Share feature ─────────────────────────────────────────────────

      var shareTab = 'public'

      function shareModalBody() {
        var tabActive   = 'flex-1 py-1.5 text-sm rounded-md font-medium transition bg-white shadow text-gray-900'
        var tabInactive = 'flex-1 py-1.5 text-sm rounded-md font-medium transition text-gray-500 hover:text-gray-700'
        return (
          '<div class="flex rounded-lg border border-gray-200 p-1 bg-gray-50">' +
            '<button id="sh-tab-public" onclick="setShareTab(\'public\')" class="' + tabActive + '">' + t('share_public') + '</button>' +
            '<button id="sh-tab-private" onclick="setShareTab(\'private\')" class="' + tabInactive + '">' + t('share_private') + '</button>' +
          '</div>' +
          '<p id="sh-desc" class="text-xs text-gray-500">' + t('share_public_desc') + '</p>' +

          '<div id="sh-pw-row" class="hidden">' +
            '<label class="' + lbl + '">' + t('share_access_password') + ' *</label>' +
            '<input id="sh-pw" type="password" autocomplete="new-password" class="' + inp + '" placeholder="' + t('share_password_placeholder') + '"/>' +
          '</div>' +

          '<div class="flex items-center gap-3">' +
            '<input id="sh-show-rent" type="checkbox" checked class="w-4 h-4 rounded text-indigo-600 border-gray-300 focus:ring-indigo-500"/>' +
            '<label for="sh-show-rent" class="text-sm text-gray-700 select-none cursor-pointer">' + t('share_show_rent') + '</label>' +
          '</div>' +

          '<div>' +
            '<label class="' + lbl + '">' + t('share_link_expiry') + '</label>' +
            '<select id="sh-expiry" class="' + inp + '">' +
              '<option value="">'   + t('share_expiry_never') + '</option>' +
              '<option value="7">'  + t('share_expiry_7d')   + '</option>' +
              '<option value="30">' + t('share_expiry_30d')  + '</option>' +
              '<option value="90">' + t('share_expiry_90d')  + '</option>' +
            '</select>' +
          '</div>' +

          '<div id="sh-result" class="hidden p-4 bg-indigo-50 rounded-xl border border-indigo-100">' +
            '<p class="text-xs font-semibold text-indigo-700 mb-2">✓ ' + t('share_link_generated') + '</p>' +
            '<div class="flex gap-2">' +
              '<input id="sh-url" readonly class="flex-1 text-xs bg-white border border-indigo-200 rounded-lg px-3 py-2 text-gray-700 min-w-0"/>' +
              '<button onclick="copyShareLink()" id="sh-copy-btn" class="px-3 py-2 rounded-lg text-xs font-medium bg-indigo-600 hover:bg-indigo-700 text-white transition flex-shrink-0">' + t('share_copy') + '</button>' +
            '</div>' +
          '</div>' +

          '<div class="pt-3 border-t border-gray-100">' +
            '<p class="text-sm font-semibold text-gray-900 mb-3">' + t('share_active_links') + '</p>' +
            '<div id="sh-active"><p class="text-xs text-gray-400">' + t('loading') + '</p></div>' +
          '</div>'
        )
      }

      window.showShareModal = function() {
        shareTab = 'public'
        RM.openModal(
          t('share_property'),
          shareModalBody(),
          '<button onclick="RM.closeModal()" class="' + btnS + '">' + t('close') + '</button>' +
          ' <button id="sh-gen-btn" onclick="generateShareLink()" class="' + btnP + '">' + t('share_generate') + '</button>'
        )
        loadActiveShares()
      }

      window.setShareTab = function(tab) {
        shareTab = tab
        var tabActive   = 'flex-1 py-1.5 text-sm rounded-md font-medium transition bg-white shadow text-gray-900'
        var tabInactive = 'flex-1 py-1.5 text-sm rounded-md font-medium transition text-gray-500 hover:text-gray-700'
        document.getElementById('sh-tab-public').className  = tab === 'public'  ? tabActive : tabInactive
        document.getElementById('sh-tab-private').className = tab === 'private' ? tabActive : tabInactive
        document.getElementById('sh-desc').textContent = tab === 'public' ? t('share_public_desc') : t('share_private_desc')
        document.getElementById('sh-pw-row').classList.toggle('hidden', tab !== 'private')
        document.getElementById('sh-result').classList.add('hidden')
      }

      window.generateShareLink = async function() {
        var pw      = (document.getElementById('sh-pw') || {}).value || ''
        var btn     = document.getElementById('sh-gen-btn')
        var expDays = document.getElementById('sh-expiry').value
        var showR   = document.getElementById('sh-show-rent').checked

        if (shareTab === 'private' && !pw.trim()) {
          RM.toast(t('share_pw_required'), 'error')
          document.getElementById('sh-pw').focus()
          return
        }

        var expiresAt = null
        if (expDays) {
          var d = new Date()
          d.setDate(d.getDate() + parseInt(expDays))
          expiresAt = d.toISOString()
        }

        btn.textContent = t('share_generating')
        btn.disabled    = true

        var res = await RM.db.rpc('create_property_share', {
          p_room_id:    roomId,
          p_share_type: shareTab,
          p_password:   shareTab === 'private' ? pw.trim() : null,
          p_show_rent:  showR,
          p_expires_at: expiresAt
        })

        btn.textContent = t('share_generate')
        btn.disabled    = false

        if (res.error) { RM.toast(t('error'), 'error'); return }

        var token    = res.data
        var base     = window.location.pathname.replace(/\/(owner|tenant)\/[^/]*$/, '/')
        var shareUrl = window.location.origin + base + 'share.html?t=' + token

        document.getElementById('sh-url').value = shareUrl
        document.getElementById('sh-result').classList.remove('hidden')
        if (shareTab === 'private') document.getElementById('sh-pw').value = ''

        RM.toast(t('share_link_generated'))
        await loadActiveShares()
      }

      window.copyShareLink = function() {
        var url = document.getElementById('sh-url').value
        var btn = document.getElementById('sh-copy-btn')
        var orig = t('share_copy')

        function onCopied() {
          btn.textContent = t('share_copied')
          setTimeout(function() { btn.textContent = orig }, 2000)
        }

        if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
          navigator.share({ url: url }).catch(function() {})
          return
        }
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(onCopied).catch(function() {
            document.getElementById('sh-url').select(); document.execCommand('copy'); onCopied()
          })
        } else {
          document.getElementById('sh-url').select(); document.execCommand('copy'); onCopied()
        }
      }

      async function loadActiveShares() {
        var container = document.getElementById('sh-active')
        if (!container) return

        var res = await RM.db.from('property_shares')
          .select('*')
          .eq('room_id', roomId)
          .order('created_at', { ascending: false })

        var shares = res.data || []

        if (!shares.length) {
          container.innerHTML = '<p class="text-xs text-gray-400">' + t('share_no_links') + '</p>'
          return
        }

        container.innerHTML = shares.map(function(s) {
          var isExpired  = s.expires_at && new Date(s.expires_at) < new Date()
          var expiryText = s.expires_at
            ? (isExpired ? '⚠ ' : '') + t('share_expires') + ' ' + RM.formatDate(s.expires_at)
            : t('share_never_expires')
          var typeBadge = s.share_type === 'private'
            ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">🔒 ' + t('share_private') + '</span>'
            : '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">🌐 ' + t('share_public') + '</span>'
          var rentBadge = s.show_rent
            ? ''
            : ' <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500">No rent</span>'

          return (
            '<div class="flex items-start justify-between py-2.5 border-b border-gray-100 last:border-0 gap-3">' +
              '<div class="min-w-0 flex-1">' +
                '<div class="flex items-center flex-wrap gap-1.5 mb-1">' + typeBadge + rentBadge + '</div>' +
                '<p class="text-xs ' + (isExpired ? 'text-red-500' : 'text-gray-500') + '">' + expiryText + '</p>' +
                '<p class="text-xs text-gray-400 mt-0.5">' +
                  s.view_count + ' ' + t('share_views') + ' · ' + RM.formatDate(s.created_at) +
                '</p>' +
              '</div>' +
              '<button onclick="revokeShare(\'' + s.id + '\')" class="text-xs text-red-600 hover:bg-red-50 px-2.5 py-1.5 rounded-lg font-medium transition flex-shrink-0">' +
                t('share_revoke') +
              '</button>' +
            '</div>'
          )
        }).join('')
      }

      window.revokeShare = async function(shareId) {
        if (!confirm(t('share_revoke_confirm'))) return
        var res = await RM.db.from('property_shares').delete().eq('id', shareId)
        if (res.error) { RM.toast(t('error'), 'error'); return }
        RM.toast(t('share_revoked'))
        var resultEl = document.getElementById('sh-result')
        if (resultEl) resultEl.classList.add('hidden')
        await loadActiveShares()
      }

      await load()
    })()
  </script>
</body>
</html>
