<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>RentManager — Login</title>
  <script src="./js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./css/theme.css"/>
  <script src="./js/app.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Language + theme toggles -->
    <div class="flex justify-end gap-2 mb-4">
      <button id="theme-btn" type="button" title="Toggle theme"
        class="text-sm px-3 py-1.5 bg-white border border-gray-200 rounded-xl shadow-sm hover:bg-gray-50 text-gray-600 font-medium transition">
      </button>
      <button id="lang-btn" type="button"
        class="text-sm px-3 py-1.5 bg-white border border-gray-200 rounded-xl shadow-sm hover:bg-gray-50 text-gray-600 font-medium transition">
        DE
      </button>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg select-none">R</div>
        <div>
          <h1 class="text-xl font-bold text-gray-900">RentManager</h1>
          <p id="sub" class="text-xs text-gray-400">Property Management</p>
        </div>
      </div>

      <!-- Set-password view (invite / recovery links) -->
      <div id="setpw-view" class="hidden space-y-5">
        <div>
          <h2 id="setpw-title" class="text-base font-semibold text-gray-800 mb-1">Set Your Password</h2>
          <p id="setpw-subtitle" class="text-sm text-gray-500">Choose a password to access your account.</p>
        </div>
        <div>
          <label id="lbl-pw-new" for="pw-new" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
          <input id="pw-new" type="password" autocomplete="new-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
        </div>
        <div>
          <label id="lbl-pw-confirm" for="pw-confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input id="pw-confirm" type="password" autocomplete="new-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
        </div>
        <p id="setpw-err" class="hidden text-sm text-red-600 bg-red-50 px-4 py-2.5 rounded-xl"></p>
        <button id="setpw-btn" type="button"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-sm disabled:opacity-50 disabled:cursor-not-allowed">
          Set Password
        </button>
      </div>

      <!-- Login form -->
      <div id="login-view">
        <form id="form" class="space-y-5" novalidate>
          <div>
            <label id="lbl-email" for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="email" type="email" required autocomplete="email"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
          </div>
          <div>
            <label id="lbl-pw" for="pw" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="pw" type="password" required autocomplete="current-password"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
          </div>
          <p id="err" class="hidden text-sm text-red-600 bg-red-50 px-4 py-2.5 rounded-xl"></p>
          <button id="submit-btn" type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition text-sm">
            Login
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">RentManager &copy; 2025</p>
  </div>

  <script>
    (function() {
      var t = RM.t

      // ── Detect invite / recovery link before Supabase clears the hash ────────
      // Store the flag in sessionStorage so it survives a language-toggle reload.
      var rawHash = window.location.hash
      var hashParams = new URLSearchParams(rawHash.replace(/^#/, ''))
      var authType = hashParams.get('type')
      if (authType === 'invite' || authType === 'recovery') {
        sessionStorage.setItem('rm_auth_flow', authType)
      }
      var isInviteFlow = !!sessionStorage.getItem('rm_auth_flow')

      // ── Theme ────────────────────────────────────────────────────────────────
      function applyThemeBtn() {
        document.getElementById('theme-btn').textContent = RM.getTheme() === 'dark' ? '☀' : '☾'
      }
      applyThemeBtn()
      document.getElementById('theme-btn').addEventListener('click', function() {
        RM.setTheme(RM.getTheme() === 'dark' ? 'light' : 'dark')
        applyThemeBtn()
      })

      // ── Language ─────────────────────────────────────────────────────────────
      function applyLang() {
        var lang = RM.getLang()
        document.documentElement.lang = lang
        document.getElementById('lang-btn').textContent  = lang === 'en' ? 'DE' : 'EN'
        // Login view labels
        document.getElementById('lbl-email').textContent  = t('email')
        document.getElementById('lbl-pw').textContent     = t('password')
        document.getElementById('submit-btn').textContent = t('login')
        // Set-password view labels
        document.getElementById('setpw-title').textContent    = t('set_password')
        document.getElementById('setpw-subtitle').textContent = t('set_password_subtitle')
        document.getElementById('lbl-pw-new').textContent     = t('new_password')
        document.getElementById('lbl-pw-confirm').textContent = t('confirm_password')
        document.getElementById('setpw-btn').textContent      = t('set_password')
      }
      applyLang()

      document.getElementById('lang-btn').addEventListener('click', function() {
        RM.setLang(RM.getLang() === 'en' ? 'de' : 'en')
      })

      // ── Route to correct view ─────────────────────────────────────────────────
      if (isInviteFlow) {
        document.getElementById('login-view').classList.add('hidden')
        document.getElementById('setpw-view').classList.remove('hidden')

        // Supabase auto-consumes the hash tokens and establishes a session.
        // If the link is expired, getSession() returns null.
        ;(async function() {
          var errEl = document.getElementById('setpw-err')
          var btn   = document.getElementById('setpw-btn')

          // getSession() alone can miss invite tokens before Supabase finishes
          // processing them. Listen for SIGNED_IN as the reliable signal, with
          // a parallel getSession() fast-path and a timeout fallback.
          var session = await new Promise(function(resolve) {
            var done = false
            var timer = setTimeout(function() {
              if (!done) { done = true; resolve(null) }
            }, 6000)

            RM.db.auth.onAuthStateChange(function(event, sess) {
              if (done) return
              if (event === 'SIGNED_IN' && sess) {
                clearTimeout(timer); done = true; resolve(sess)
              }
            })

            RM.db.auth.getSession().then(function(res) {
              if (done) return
              if (res.data.session) { clearTimeout(timer); done = true; resolve(res.data.session) }
            })
          })

          if (!session) {
            sessionStorage.removeItem('rm_auth_flow')
            errEl.textContent = t('invite_expired')
            errEl.classList.remove('hidden')
            btn.disabled = true
          }
        })()

        document.getElementById('setpw-btn').addEventListener('click', function() {
          var btn    = document.getElementById('setpw-btn')
          var errEl  = document.getElementById('setpw-err')
          var pw1    = document.getElementById('pw-new').value
          var pw2    = document.getElementById('pw-confirm').value

          errEl.classList.add('hidden')

          if (pw1.length < 8) {
            errEl.textContent = t('password_too_short')
            errEl.classList.remove('hidden')
            return
          }
          if (pw1 !== pw2) {
            errEl.textContent = t('password_mismatch')
            errEl.classList.remove('hidden')
            return
          }

          btn.disabled = true
          btn.textContent = t('loading')

          ;(async function() {
            var res = await RM.db.auth.updateUser({ password: pw1 })
            if (res.error) {
              errEl.textContent = res.error.message
              errEl.classList.remove('hidden')
              btn.disabled = false
              btn.textContent = t('set_password')
              return
            }
            sessionStorage.removeItem('rm_auth_flow')
            // Invitees are always tenants — go straight to tenant dashboard
            window.location.href = 'tenant/dashboard.html'
          })()
        })

      } else {
        // ── Normal login flow ───────────────────────────────────────────────────

        // Redirect already-logged-in users immediately
        ;(async function() {
          var sessionRes = await RM.db.auth.getSession()
          if (!sessionRes.data.session) return
          var profRes = await RM.db.from('profiles').select('role').eq('id', sessionRes.data.session.user.id).single()
          window.location.href = profRes.data?.role === 'owner'
            ? 'owner/dashboard.html' : 'tenant/dashboard.html'
        })()

        document.getElementById('form').addEventListener('submit', function(e) {
          e.preventDefault()
          var btn = document.getElementById('submit-btn')
          var err = document.getElementById('err')
          err.classList.add('hidden')
          btn.textContent = t('loading')
          btn.disabled = true

          ;(async function() {
            var res = await RM.db.auth.signInWithPassword({
              email:    document.getElementById('email').value.trim(),
              password: document.getElementById('pw').value,
            })

            if (res.error) {
              err.textContent = t('login_error')
              err.classList.remove('hidden')
              btn.textContent = t('login')
              btn.disabled = false
              return
            }

            var profRes = await RM.db.from('profiles').select('role').eq('id', res.data.user.id).single()
            window.location.href = profRes.data?.role === 'owner'
              ? 'owner/dashboard.html' : 'tenant/dashboard.html'
          })()
        })
      }
    })()
  </script>
</body>
</html>
