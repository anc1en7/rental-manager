name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -f -X POST https://hms.appetitico.com/hooks/rental-manager \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}"
