<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <title>Room Listing — RentManager</title>
  <script src="./js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./css/theme.css"/>
  <script src="./js/app.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Loading -->
  <div id="state-loading" class="flex items-center justify-center min-h-screen">
    <p class="text-gray-400 text-sm">Loading…</p>
  </div>

  <!-- Error -->
  <div id="state-error" class="hidden flex items-center justify-center min-h-screen p-4">
    <div class="text-center max-w-sm">
      <div class="text-5xl mb-4">🔗</div>
      <h1 id="error-title" class="text-xl font-bold text-gray-900 mb-2"></h1>
      <p id="error-msg" class="text-sm text-gray-500"></p>
    </div>
  </div>

  <!-- Password gate -->
  <div id="state-password" class="hidden flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 w-full max-w-sm p-8">
      <div class="text-center mb-6">
        <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-3 text-3xl">🔒</div>
        <h1 id="pw-title" class="text-lg font-bold text-gray-900"></h1>
        <p id="pw-subtitle" class="text-sm text-gray-500 mt-1"></p>
      </div>
      <input id="pw-input" type="password" autocomplete="current-password"
        class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        placeholder="Password"/>
      <p id="pw-error" class="hidden text-xs text-red-600 mt-1.5 font-medium"></p>
      <button id="pw-btn" onclick="unlockWithPassword()"
        class="mt-4 w-full py-2.5 rounded-xl text-sm font-semibold transition bg-indigo-600 hover:bg-indigo-700 text-white">
      </button>
      <p class="text-center mt-5 text-xs text-gray-400">
        <span class="inline-flex items-center gap-1.5">
          <span class="w-4 h-4 bg-indigo-600 rounded flex items-center justify-center text-white font-bold" style="font-size:9px">R</span>
          RentManager
        </span>
      </p>
    </div>
  </div>

  <!-- Main content -->
  <div id="state-main" class="hidden">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-2xl mx-auto px-6 py-3.5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">R</div>
          <span class="font-bold text-gray-900 text-sm">RentManager</span>
        </div>
        <span id="header-label" class="text-xs text-gray-400 font-medium"></span>
      </div>
    </header>

    <div class="max-w-2xl mx-auto px-6 py-8">

      <!-- House breadcrumb -->
      <p id="house-crumb" class="text-sm text-gray-500 mb-1"></p>

      <!-- Room title + availability -->
      <div class="flex items-start justify-between gap-4 mb-6">
        <div>
          <h1 id="room-title" class="text-2xl font-bold text-gray-900"></h1>
          <p id="house-address" class="text-gray-500 text-sm mt-0.5"></p>
        </div>
        <div id="availability-badge" class="flex-shrink-0 mt-1"></div>
      </div>

      <!-- Room image -->
      <div id="room-image" class="mb-6"></div>

      <!-- Details card -->
      <div id="room-details" class="bg-white rounded-2xl border border-gray-200 p-6"></div>

      <p class="text-center text-xs text-gray-300 mt-10">Powered by RentManager</p>
    </div>
  </div>

  <script>
    (async function () {
      var t = RM.t, formatCurrency = RM.formatCurrency, badge = RM.badge, escHtml = RM.escHtml

      function showState(name) {
        ['loading','error','password','main'].forEach(function(s) {
          document.getElementById('state-' + s).classList.toggle('hidden', s !== name)
        })
      }

      function showError(type) {
        document.getElementById('error-title').textContent =
          type === 'expired' ? t('share_expired_title') : t('share_invalid_title')
        document.getElementById('error-msg').textContent =
          type === 'expired' ? t('share_expired_msg') : t('share_invalid_msg')
        showState('error')
      }

      async function fetchShareData(password) {
        var res = await RM.db.rpc('get_share_data', {
          p_token:    token,
          p_password: password || null
        })
        return res.data
      }

      function renderRoom(data) {
        var room     = data.room
        var house    = data.house
        var showRent = data.show_rent

        document.title = t('room_label') + ' ' + escHtml(room.room_number) + ' — ' + escHtml(house.name)

        document.getElementById('header-label').textContent = t('share_listing')
        document.getElementById('house-crumb').textContent  = house.name
        document.getElementById('room-title').textContent   = t('room_label') + ' ' + room.room_number
        document.getElementById('house-address').textContent =
          house.address + ', ' + house.city + ', ' + house.country
        document.getElementById('availability-badge').innerHTML =
          badge(room.is_available ? 'vacant' : 'occupied')

        // Image
        document.getElementById('room-image').innerHTML = room.image_url
          ? '<img src="' + escHtml(room.image_url) + '" class="w-full rounded-2xl object-cover max-h-80"/>'
          : ''

        // Details rows
        function row(label, value) {
          return '<div class="flex justify-between gap-4 py-2.5 border-b border-gray-100 last:border-0">' +
            '<span class="text-sm text-gray-500">' + label + '</span>' +
            '<span class="text-sm text-gray-900 text-right font-medium">' + value + '</span>' +
          '</div>'
        }

        var rows =
          row(t('floor_label'), room.floor) +
          (room.area_sqm ? row(t('area_sqm'), room.area_sqm + ' m²') : '') +
          (showRent
            ? row(t('monthly_rent'),
                '<span class="text-indigo-700 font-semibold">' + formatCurrency(room.monthly_rent) + ' ' + t('per_month') + '</span>')
            : '') +
          row(t('utilities'),
            room.utilities_included
              ? '<span class="text-emerald-600">✓ ' + t('yes') + '</span>'
              : t('no')) +
          (room.utility_details ? row(t('utility_details'), escHtml(room.utility_details)) : '') +
          (room.description
            ? '<div class="pt-3"><p class="text-sm text-gray-500 mb-1">' + t('description') + '</p>' +
                '<p class="text-sm text-gray-700 leading-relaxed">' + escHtml(room.description) + '</p></div>'
            : '')

        document.getElementById('room-details').innerHTML = rows
        showState('main')
      }

      window.unlockWithPassword = async function () {
        var pw  = document.getElementById('pw-input').value
        var btn = document.getElementById('pw-btn')
        var err = document.getElementById('pw-error')

        if (!pw) return
        err.classList.add('hidden')
        btn.textContent = t('loading')
        btn.disabled    = true

        var data = await fetchShareData(pw)

        btn.textContent = t('share_unlock')
        btn.disabled    = false

        if (!data || data.error === 'invalid_password') {
          err.textContent = t('share_pw_wrong')
          err.classList.remove('hidden')
          document.getElementById('pw-input').value = ''
          document.getElementById('pw-input').focus()
          return
        }
        if (data.error === 'expired')   { showError('expired');   return }
        if (data.error === 'not_found') { showError('not_found'); return }
        renderRoom(data)
      }

      var token = new URLSearchParams(location.search).get('t')
      if (!token) { showError('not_found'); return }

      showState('loading')
      var data = await fetchShareData(null)

      if (!data)                        { showError('not_found'); return }
      if (data.error === 'not_found')   { showError('not_found'); return }
      if (data.error === 'expired')     { showError('expired');   return }

      if (data.error === 'password_required' || data.error === 'invalid_password') {
        document.getElementById('pw-title').textContent    = t('share_pw_gate_title')
        document.getElementById('pw-subtitle').textContent = t('share_pw_gate_subtitle')
        document.getElementById('pw-btn').textContent      = t('share_unlock')
        showState('password')
        document.getElementById('pw-input').addEventListener('keydown', function(e) {
          if (e.key === 'Enter') window.unlockWithPassword()
        })
        return
      }

      renderRoom(data)
    })()
  </script>
</body>
</html>
